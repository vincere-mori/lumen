@keyframes ripple{0%{transform:scale(0);opacity:0.45;}100%{transform:scale(3.5);opacity:0;}}

function getAutoTheme(){
  const h=new Date().getHours();
  if(h>=5&&h<9) return 'dawn';

// Local-timezone YYYY-MM-DD. Using toISOString() would give UTC, which causes the
// "midnight didn't roll over" bug for users east of UTC (e.g. local 00:30 = UTC 21:30 prev day).
function dateKey(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
const todayKey=()=>dateKey(new Date());
const fmtTime=s=>`${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
const WEEK_FULL={ru:['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'],en:['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday']};
const MONTHS_FULL={ru:['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'],en:['January','February','March','April','May','June','July','August','September','October','November','December']};
function fmtDateLong(lang){const d=new Date();return `${WEEK_FULL[lang][d.getDay()]} · ${d.getDate()} ${MONTHS_FULL[lang][d.getMonth()]}`;}
function fmtDateShort(date,lang){const d=new Date(date);return `${d.getDate()} ${MONTHS_FULL[lang][d.getMonth()]}`;}
function calcHabitStreak(history){
  if(!history?.length)return 0;
  let streak=0,d=new Date();
  if(!history.includes(todayKey()))d.setDate(d.getDate()-1);
  for(let i=0;i<365;i++){
    if(history.includes(dateKey(d))){streak++;d.setDate(d.getDate()-1);}else break;
  }
  return streak;
}

// Smoothly counts up/down to `value`. Pulses on change.
function AnimatedNumber({value,style,duration=600}){
  const [display,setDisplay]=useState(value);
  const [pulse,setPulse]=useState(false);
  const displayRef=useRef(value);displayRef.current=display;
  const rafRef=useRef(0);
  useEffect(()=>{
    // Animate from whatever is on screen right now (handles mid-animation target changes
    // without snapping back). If we're already at the target, nothing to do.
    if(value===displayRef.current)return;
    const from=displayRef.current,to=value,start=performance.now();
    setPulse(true);
    cancelAnimationFrame(rafRef.current);
    const tick=(now)=>{
      const p=Math.min(1,(now-start)/duration);
      const eased=1-Math.pow(1-p,3); // easeOutCubic
      setDisplay(Math.round(from+(to-from)*eased));
      if(p<1)rafRef.current=requestAnimationFrame(tick);
    };
    rafRef.current=requestAnimationFrame(tick);
    const tm=setTimeout(()=>setPulse(false),duration);
    return()=>{cancelAnimationFrame(rafRef.current);clearTimeout(tm);};
  },[value]);
  return <span style={{...style,display:'inline-block',animation:pulse?'numberPulse 0.55s cubic-bezier(0.34,1.56,0.64,1)':'none'}}>{display}</span>;
}

// ── TASK ITEM ─────────────────────────────────────────────
function TaskItem({task,idx,total,onComplete,onDelete,onEdit,onTogglePriority,onMove,isRunning,elapsed,onTimerStart,onTimerPause,onTimerStop,t,C}){
  const [popping,setPopping]=useState(false);
  const [popCoins,setPopCoins]=useState(0);
  const [particles,setParticles]=useState(false);
  const coinR={easy:5,medium:10,hard:20};
  const diffC={easy:C.green,medium:C.gold,hard:C.red};
  const diffL={easy:t.easy,medium:t.medium,hard:t.hard};

  function handleComplete(){
    if(task.completed)return;
    const r=coinR[task.difficulty];
    setPopping(true);setPopCoins(r);setParticles(true);
    setTimeout(()=>{setPopping(false);setParticles(false);},1000);
    onComplete(task.id);
  }
  function handleStop(){
    const c=onTimerStop(task.id);
    if(c>0){setPopCoins(c);setPopping(true);setTimeout(()=>setPopping(false),900);}
  }

  return(
    <div style={{padding:'11px 0',borderBottom:`1px solid ${C.border}`,opacity:task.completed?0.4:1,transition:'opacity 0.3s',animation:'staggerFadeUp 0.3s ease both'}}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        {/* priority */}
        <div onClick={()=>!task.completed&&onTogglePriority(task.id)} style={{cursor:task.completed?'default':'pointer',flexShrink:0}}>
          <Ic n={task.priority?'star':'starOff'} s={20} c={task.priority?C.gold:C.textDim}/>
        </div>
        {/* checkbox */}
        <div onClick={handleComplete} style={{width:26,height:26,borderRadius:5,flexShrink:0,border:`1.5px solid ${task.completed?C.gold:C.border}`,background:task.completed?C.gold:'transparent',display:'flex',alignItems:'center',justifyContent:'center',cursor:task.completed?'default':'pointer',transition:'all 0.2s',position:'relative'}}>
          {task.completed&&<Ic n="check" s={19} c={C.bg}/>}
          {popping&&<div style={{position:'absolute',top:-4,left:'50%',transform:'translateX(-50%)',fontFamily:'Cinzel',fontSize:15,color:C.gold,animation:'coinPop 0.9s ease forwards',pointerEvents:'none',whiteSpace:'nowrap'}}>+{popCoins}</div>}
          {particles&&[0,1,2,3].map(i=><div key={i} style={{position:'absolute',width:5,height:5,borderRadius:'50%',background:C.gold,pointerEvents:'none',animation:`particleFly${i} 0.85s ease-out forwards`}}/>)}
        </div>
        {/* text */}
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',alignItems:'center',gap:5}}>
            <p style={{fontFamily:'Inter',fontSize:19.5,color:C.text,textDecoration:task.completed?'line-through':'none',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{task.title}</p>
            {task.recurring&&<Ic n="repeat" s={17} c={C.textDim}/>}
          </div>
          <div style={{display:'flex',gap:7,marginTop:3,alignItems:'center'}}>
            <span style={{fontFamily:'Cinzel',fontSize:14,color:diffC[task.difficulty],letterSpacing:'0.1em'}}>{diffL[task.difficulty].toUpperCase()}</span>
            <span style={{fontFamily:'Cinzel',fontSize:14,color:C.textDim}}>+{coinR[task.difficulty]}</span>
            {elapsed>0&&<span style={{fontFamily:'Cinzel',fontSize:14,color:C.goldDim}}>{Math.floor(elapsed/60)} {t.focusMin}</span>}
          </div>
        </div>
        {/* controls */}
        {!task.completed?(
          <div style={{display:'flex',alignItems:'center',gap:4,flexShrink:0}}>
            {isRunning?(
              <>
                <span style={{fontFamily:'Cinzel',fontSize:16,color:C.gold,animation:'pulse 1.5s infinite',minWidth:36}}>{fmtTime(elapsed||0)}</span>
                <div onClick={()=>onTimerPause(task.id)} style={{cursor:'pointer',padding:2}}><Ic n="pause" s={20} c={C.gold}/></div>
                <div onClick={handleStop} style={{cursor:'pointer',padding:2}}><Ic n="stop" s={20} c={C.red}/></div>
              </>
            ):(
              <>
                {elapsed>0&&<span style={{fontFamily:'Cinzel',fontSize:16,color:C.goldDim,minWidth:36}}>{fmtTime(elapsed)}</span>}
                <div onClick={()=>onTimerStart(task.id)} style={{cursor:'pointer',padding:2,opacity:0.7}}><Ic n="play" s={21} c={C.gold}/></div>
              </>
            )}
            <div onClick={()=>onEdit(task)} style={{padding:2,cursor:'pointer',opacity:0.45}}><Ic n="edit" s={20} c={C.textMid}/></div>
            {!isRunning&&<div onClick={()=>onDelete(task.id)} style={{padding:2,cursor:'pointer',opacity:0.3}}><Ic n="trash" s={19} c={C.textMid}/></div>}
          </div>
        ):null}
      </div>
      {isRunning&&(
        <div style={{marginTop:7,marginLeft:50,height:2,background:C.border,borderRadius:2,overflow:'hidden'}}>
          <div style={{height:'100%',background:C.gold,width:`${Math.min(100,(elapsed||0)/1500*100)}%`,transition:'width 1s linear'}}/>
        </div>
      )}
    </div>
  );
}

// ── HABIT ITEM ────────────────────────────────────────────
function HabitItem({habit,onToggle,onEdit,lang,C}){
  const today=todayKey();
  const isDone=habit.doneHistory?.includes(today);
  const streak=calcHabitStreak(habit.doneHistory||[]);
  const [bounce,setBounce]=useState(false);
  const weekDays=S[lang].weekDays;
  // Last 7 days ending today; each cell shows the ACTUAL weekday letter for that date.
  const weekStatus=Array.from({length:7},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-(6-i));
    const monIdx=(d.getDay()+6)%7;
    return {done:habit.doneHistory?.includes(dateKey(d)),label:weekDays[monIdx],isToday:i===6};
  });
  function handleToggle(){setBounce(true);setTimeout(()=>setBounce(false),500);onToggle(habit.id);}
  return(
    <div style={{border:`1px solid ${isDone?C.gold:C.border}`,borderRadius:10,padding:'13px 13px',marginBottom:9,background:isDone?C.goldFaint:'transparent',transition:'all 0.25s',animation:'staggerFadeUp 0.35s ease both'}}>

        <div onClick={handleToggle} style={{width:27,height:27,borderRadius:'50%',border:`2px solid ${isDone?C.gold:C.border}`,background:isDone?C.gold:'transparent',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0,transition:'all 0.25s',animation:bounce?'habitCheck 0.45s cubic-bezier(0.34,1.56,0.64,1)':'none'}}>
          {isDone&&<Ic n="check" s={20} c={C.bg}/>}
        </div>
        <div style={{flex:1}}>
          <p style={{fontFamily:'Inter',fontSize:20,color:C.text}}>{habit.name}</p>
          <div style={{display:'flex',gap:7,marginTop:5}}>
            {weekStatus.map((s,i)=>(
              <div key={i} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2,minWidth:18}}>
                <div style={{width:6,height:6,borderRadius:'50%',background:s.done?C.gold:C.border,transition:'background 0.2s',boxShadow:s.isToday&&s.done?`0 0 4px ${C.gold}`:'none'}}/>
                <span style={{fontFamily:'Cinzel',fontSize:11,letterSpacing:'0.02em',color:s.isToday?C.gold:C.textDim,fontWeight:s.isToday?500:400}}>{s.label}</span>
              </div>
            ))}
          </div>
        </div>
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
          {streak>0&&<><Ic n="fire" s={22} c={streak>6?C.gold:C.goldDim}/><span style={{fontFamily:'Cinzel',fontSize:15,color:streak>6?C.gold:C.goldDim}}>{streak}</span></>}

    </div>
  );

// ── CHRONICLE TAB ─────────────────────────────────────────
function HeatMap({habits,lang,C}){
  if(!habits.length)return null;
  const weekDays=S[lang].weekDays;
  const WEEKS=5;
  // Build a Mon-Sun aligned grid. Last row is the current week (Mon..Sun);
  // future cells (after today within this week) are drawn faded.
  const today=new Date();today.setHours(0,0,0,0);
  const todayKeyStr=dateKey(today);
  const todayMonIdx=(today.getDay()+6)%7; // 0=Mon..6=Sun
  const thisMon=new Date(today);thisMon.setDate(thisMon.getDate()-todayMonIdx);
  const weeks=[];
  for(let w=0;w<WEEKS;w++){
    const wkStart=new Date(thisMon);wkStart.setDate(wkStart.getDate()-(WEEKS-1-w)*7);
    const week=[];
    for(let d=0;d<7;d++){
      const day=new Date(wkStart);day.setDate(day.getDate()+d);
      week.push({key:dateKey(day),isFuture:day.getTime()>today.getTime()});
    }
    weeks.push(week);
  }
  return(
    <div style={{border:`1px solid ${C.border}`,borderRadius:12,padding:'14px 14px',marginBottom:11,background:C.goldFaint}}>
      <p style={{fontFamily:'Cinzel',fontSize:14,color:C.textDim,letterSpacing:'0.12em',marginBottom:10}}>{lang==='ru'?'КАРТА ПРИВЫЧЕК · 5 НЕДЕЛЬ':'HABIT MAP · 5 WEEKS'}</p>
      <div style={{maxWidth:280,margin:'0 auto'}}>
        <div style={{display:'flex',gap:3,marginBottom:4}}>
          {weekDays.map((d,i)=><div key={d} style={{flex:1,textAlign:'center',fontFamily:'Cinzel',fontSize:11,letterSpacing:'0.02em',color:i===todayMonIdx?C.gold:C.textDim,fontWeight:i===todayMonIdx?500:400}}>{d}</div>)}
        </div>
        {weeks.map((week,wi)=>(
          <div key={wi} style={{display:'flex',gap:3,marginBottom:3}}>
            {week.map(cell=>{
              if(cell.isFuture)return <div key={cell.key} style={{flex:1,aspectRatio:'1',borderRadius:3,background:'transparent',border:`1px dashed ${C.border}`,opacity:0.4}}/>;
              const count=habits.filter(h=>h.doneHistory?.includes(cell.key)).length;
              const ratio=habits.length>0?count/habits.length:0;
              const isT=cell.key===todayKeyStr;
              const bg=count===0?C.border:ratio<0.4?`${C.gold}30`:ratio<0.75?C.goldDim:C.gold;
              return <div key={cell.key} style={{flex:1,aspectRatio:'1',borderRadius:3,background:bg,border:isT?`1.5px solid ${C.gold}`:'none',boxShadow:isT?`0 0 6px ${C.gold}55`:'none',transition:'background 0.3s'}}/>;
            })}
          </div>
        ))}
      </div>
      <div style={{display:'flex',alignItems:'center',gap:4,marginTop:10,justifyContent:'center'}}>
        <span style={{fontFamily:'Cinzel',fontSize:12,color:C.textDim,marginRight:2}}>0</span>
        {[0,0.3,0.6,1].map((v,i)=><div key={i} style={{width:10,height:10,borderRadius:2,background:v===0?C.border:v<0.4?`${C.gold}30`:v<0.75?C.goldDim:C.gold}}/>)}
        <span style={{fontFamily:'Cinzel',fontSize:12,color:C.textDim,marginLeft:2}}>100%</span>
      </div>
    </div>
  );
}

// ── SUNDAY REVIEW ─────────────────────────────────────────
function SundayReview({onClose,onSave,t,C,lang,tasksByDay,habits,prayers,coins,todayCoins,streak,totalFocusMin,weeklyReflections}){
  const [reflection,setReflection]=useState('');
  const [showHistory,setShowHistory]=useState(false);

  // Compute past 7 days (incl. today, which is Sunday)
  const stats=useMemo(()=>{
    const today=new Date();
    let tasksDone=0,habitsKept=0,prayerDays=0;
    const days=[];
    for(let i=6;i>=0;i--){
      const d=new Date(today);d.setDate(d.getDate()-i);
      const k=dateKey(d);
      const tCount=tasksByDay[k]||0;
      tasksDone+=tCount;
      days.push({key:k,count:tCount,label:t.weekDays[(d.getDay()+6)%7]});
      if(prayers.some(p=>p.date===k))prayerDays++;
    }
    // Habits: how many habit-days were checked over past 7 days
    habits.forEach(h=>{const hist=h.doneHistory||[];days.forEach(d=>{if(hist.includes(d.key))habitsKept++;});});
    return {tasksDone,habitsKept,prayerDays,days};
  },[tasksByDay,habits,prayers,t]);

  const maxV=Math.max(...stats.days.map(d=>d.count),1),CHART_H=70;

  function handleSave(){
    const txt=reflection.trim();
    if(txt){
      onSave({date:todayKey(),text:txt,stats:{tasksDone:stats.tasksDone,habitsKept:stats.habitsKept,prayerDays:stats.prayerDays}});
    }
    onClose(true);
  }

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.78)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',padding:'20px',animation:'fadeIn 0.4s ease',backdropFilter:'blur(3px)'}}>
      <div style={{background:C.bg,border:`1px solid ${C.gold}`,borderRadius:14,padding:'24px 22px 20px',maxWidth:520,width:'100%',maxHeight:'92vh',overflowY:'auto',boxShadow:`0 0 60px ${C.gold}33`,animation:'onboardReveal 0.55s cubic-bezier(0.22,1,0.36,1)'}}>
        {/* Header */}
        <div style={{textAlign:'center',marginBottom:18}}>
          <div style={{fontFamily:'Cinzel',fontSize:34,color:C.gold,marginBottom:4,opacity:0.9}}>☩</div>
          <p style={{fontFamily:'Cinzel',fontSize:18,color:C.gold,letterSpacing:'0.18em',marginBottom:5}}>{t.sundayTitle}</p>
          <p style={{fontFamily:'Spectral',fontStyle:'italic',fontSize:14.5,color:C.textMid}}>{t.sundaySubtitle}</p>
        </div>

        {/* Verse */}
        <div style={{borderTop:`1px solid ${C.border}`,borderBottom:`1px solid ${C.border}`,padding:'12px 4px',marginBottom:16,textAlign:'center'}}>
          <p style={{fontFamily:'Spectral',fontStyle:'italic',fontSize:16,color:C.text,lineHeight:1.55,marginBottom:5}}>{t.sundayVerse}</p>
          <p style={{fontFamily:'Cinzel',fontSize:13,color:C.goldDim,letterSpacing:'0.12em'}}>{t.sundayRef}</p>
        </div>

        {/* Mini chart of the week */}
        <div style={{marginBottom:16}}>
          <p style={{fontFamily:'Cinzel',fontSize:13,color:C.textDim,letterSpacing:'0.12em',marginBottom:9}}>{t.sundayWeek}</p>
          <div style={{display:'flex',alignItems:'flex-end',height:CHART_H,gap:6}}>
            {stats.days.map((d,i)=>{const isLast=i===stats.days.length-1;const h=d.count>0?Math.max(8,Math.round(d.count/maxV*(CHART_H-6))):3;return(
              <div key={d.key} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                {d.count>0&&<span style={{fontFamily:'Cinzel',fontSize:11,color:isLast?C.gold:C.textDim}}>{d.count}</span>}
                <div style={{width:'72%',maxWidth:26,height:h,borderRadius:3,background:isLast?`linear-gradient(to top,${C.goldDim},${C.gold})`:d.count>0?C.goldDim:C.border,boxShadow:isLast?`0 0 6px ${C.gold}55`:'none'}}/>
              </div>);
            })}
          </div>
          <div style={{display:'flex',marginTop:4,gap:6}}>
            {stats.days.map((d,i)=>(<span key={d.key} style={{flex:1,textAlign:'center',fontFamily:'Cinzel',fontSize:12,color:i===stats.days.length-1?C.gold:C.textDim,letterSpacing:'0.06em'}}>{d.label}</span>))}
          </div>
        </div>

        {/* Stats grid */}

// Custom window controls when running inside Tauri (decorations:false).
// In a regular browser this returns null and renders nothing.
function TauriTitleBar({C}){
  const isTauri=typeof window!=='undefined'&&(!!window.__TAURI_INTERNALS__||!!window.__TAURI__);
  const [maximized,setMaximized]=useState(false);
  function getWin(){
    try{
      const w=window.__TAURI__?.window;
      if(!w)return null;
      if(typeof w.getCurrentWindow==='function')return w.getCurrentWindow();
      if(typeof w.getCurrent==='function')return w.getCurrent();
      if(w.WebviewWindow?.getCurrent)return w.WebviewWindow.getCurrent();
      if(w.appWindow)return w.appWindow;
      return null;
    }catch{return null;}
  }
  async function call(method){
    try{const w=getWin();if(w&&typeof w[method]==='function')await w[method]();}catch{}
    if(method==='toggleMaximize'){
      try{const w=getWin();if(w?.isMaximized)setMaximized(await w.isMaximized());}catch{}
    }
  }
  useEffect(()=>{
    if(!isTauri)return;
    (async()=>{try{const w=getWin();if(w?.isMaximized)setMaximized(await w.isMaximized());}catch{}})();
    function onResize(){(async()=>{try{const w=getWin();if(w?.isMaximized)setMaximized(await w.isMaximized());}catch{}})();}
    window.addEventListener('resize',onResize);
    return()=>window.removeEventListener('resize',onResize);
  },[isTauri]);
  if(!isTauri)return null;
  return(
    <div data-tauri-drag-region style={{
      height:32,flexShrink:0,display:'flex',alignItems:'stretch',justifyContent:'space-between',
      borderBottom:`1px solid ${C.border}`,background:'rgba(0,0,0,0.22)',backdropFilter:'blur(6px)',

    }}>
      <div data-tauri-drag-region style={{flex:1,display:'flex',alignItems:'center',gap:8,padding:'0 14px',pointerEvents:'auto'}}>
        <svg data-tauri-drag-region width={11} height={14} viewBox="0 0 22 28" style={{flexShrink:0,opacity:0.7,filter:`drop-shadow(0 0 3px ${C.gold}55)`}}>
          <ellipse cx="11" cy="7" rx="4.5" ry="5.5" fill={C.gold} opacity="0.18"/>
          <path d="M11 1C9.8 4 7.5 5.5 7.5 8.2a3.5 3.5 0 0 0 7 0C14.5 5.5 12.2 4 11 1z" fill={C.gold}/>
          <line x1="11" y1="11.7" x2="11" y2="13.2" stroke={C.gold} strokeWidth="1.4" strokeLinecap="round"/>
          <path d="M7 13.5C6.2 13.5 5.5 14.2 5.5 15L5.5 18.5C5.5 19.8 6.5 20.5 8 20.5L14 20.5C15.5 20.5 16.5 19.8 16.5 18.5L16.5 15C16.5 14.2 15.8 13.5 15 13.5Z" fill="none" stroke={C.gold} strokeWidth="1.25" strokeLinejoin="round"/>
          <line x1="11" y1="20.5" x2="11" y2="23" stroke={C.gold} strokeWidth="1.4" strokeLinecap="round"/>
        </svg>
        <span data-tauri-drag-region style={{fontFamily:'Cinzel',fontSize:11,letterSpacing:'0.32em',color:C.goldDim}}>LUMEN</span>
      </div>
      <div style={{display:'flex',flexShrink:0}}>
        <button className="tb-btn" title="Minimize" onClick={()=>call('minimize')}>
          <svg width="11" height="11" viewBox="0 0 11 11"><line x1="1.5" y1="5.5" x2="9.5" y2="5.5" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/></svg>
        </button>
        <button className="tb-btn" title={maximized?'Restore':'Maximize'} onClick={()=>call('toggleMaximize')}>
          {maximized?(
            <svg width="11" height="11" viewBox="0 0 11 11">
              <rect x="1.5" y="3.5" width="6" height="6" fill="none" stroke="currentColor" strokeWidth="1"/>
              <path d="M3.5 3.5 L3.5 1.5 L9.5 1.5 L9.5 7.5 L7.5 7.5" fill="none" stroke="currentColor" strokeWidth="1" strokeLinejoin="round"/>
            </svg>
          ):(
            <svg width="11" height="11" viewBox="0 0 11 11"><rect x="1.5" y="1.5" width="8" height="8" fill="none" stroke="currentColor" strokeWidth="1"/></svg>
          )}
        </button>
        <button className="tb-btn tb-close" title="Close" onClick={()=>call('close')}>
          <svg width="11" height="11" viewBox="0 0 11 11">
            <line x1="2" y1="2" x2="9" y2="9" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/>
            <line x1="9" y1="2" x2="2" y2="9" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/>
          </svg>
        </button>
      </div>
    </div>
  );

// ── APP ───────────────────────────────────────────────────
function App(){
  // Read storage once on mount, not on every render.
  const [saved]=useState(()=>load());
  const [name,setName]=useState(saved.name||'');
  const [lang,setLang]=useState(saved.lang||'ru');
  const t=S[lang];
  const [themeMode,setThemeMode]=useState(saved.themeMode||'auto');
  const C=themeMode==='auto'?THEMES[getAutoTheme()]:THEMES[themeMode]||THEMES.night;
  const [tab,setTabRaw]=useState('tasks');
  const [prevTab,setPrevTab]=useState('tasks');
  function setTab(nt){setPrevTab(tab);setTabRaw(nt);}
  const [tasks,setTasks]=useState(saved.tasks||[]);
  const [habits,setHabits]=useState(saved.habits||[]);
  const [coins,setCoins]=useState(saved.coins??0);
  const [todayCoins,setTodayCoins]=useState(saved.todayCoins??0);
  const [streak,setStreak]=useState(saved.streak??0);
  const [lastDate,setLastDate]=useState(saved.lastDate||'');
  const [completedCount,setCompletedCount]=useState(saved.completedCount||0);
  const [totalFocusMin,setTotalFocusMin]=useState(saved.totalFocusMin||0);
  const [almsCount,setAlmsCount]=useState(saved.almsCount||0);
  const [pomoCount,setPomoCount]=useState(saved.pomoCount||0);
  const [lectioCount,setLectioCount]=useState(saved.lectioCount||0);
  const [sabbathCount,setSabbathCount]=useState(saved.sabbathCount||0);
  const [themesUsed,setThemesUsed]=useState(saved.themesUsed||[]);
  const [tasksByDay,setTasksByDay]=useState(saved.tasksByDay||{});
  const [weeklyReflections,setWeeklyReflections]=useState(saved.weeklyReflections||[]);
  const [lastSundayReview,setLastSundayReview]=useState(saved.lastSundayReview||'');
  const [showSundayReview,setShowSundayReview]=useState(false);
  const [runningTimer,setRunningTimer]=useState(null);
  const [taskElapsed,setTaskElapsed]=useState({});
  const [showSettings,setShowSettings]=useState(false);
  const [showPomo,setShowPomo]=useState(false);
  const [prayers,setPrayers]=useState(saved.prayers||[]);
  const [prayerDate,setPrayerDate]=useState(saved.prayerDate||todayKey());
  const [prayerText,setPrayerText]=useState(saved.prayerDate===todayKey()?(saved.prayerText||''):'');
  const [prayerSaved,setPrayerSaved]=useState(saved.prayerDate===todayKey()?!!saved.prayerSaved:false);
  const [taskSearch,setTaskSearch]=useState('');
  // Tracks the current calendar day. Used to trigger the daily reset when midnight passes
  // while the app is open (otherwise the reset only ran on mount).
  const [currentDateKey,setCurrentDateKey]=useState(todayKey());
  const pomoFiredRef=useRef(false);

  // Detect day rollover: poll every 30s, plus listen for tab visibility / focus
  // (so when laptop wakes or tab returns to foreground we re-check immediately).
  useEffect(()=>{
    const tick=()=>{const k=todayKey();if(k!==currentDateKey)setCurrentDateKey(k);};
    const iv=setInterval(tick,30000);
    window.addEventListener('focus',tick);
    document.addEventListener('visibilitychange',tick);
    return()=>{clearInterval(iv);window.removeEventListener('focus',tick);document.removeEventListener('visibilitychange',tick);};
  },[currentDateKey]);

  const maxHabitStreak=useMemo(()=>habits.length>0?habits.reduce((mx,h)=>Math.max(mx,calcHabitStreak(h.doneHistory||[])),0):0,[habits]);

  // body bg
  useEffect(()=>{document.body.style.background=C.bodyBg;},[C]);

  // persist
  useEffect(()=>{save({name,tasks,habits,coins,todayCoins,streak,lastDate,lang,themeMode,completedCount,totalFocusMin,prayers,prayerText,prayerSaved,prayerDate,almsCount,pomoCount,lectioCount,sabbathCount,themesUsed,tasksByDay,weeklyReflections,lastSundayReview});},[name,tasks,habits,coins,todayCoins,streak,lastDate,lang,themeMode,completedCount,totalFocusMin,prayers,prayerText,prayerSaved,prayerDate,almsCount,pomoCount,lectioCount,sabbathCount,themesUsed,tasksByDay,weeklyReflections,lastSundayReview]);

  // track which themes have been actively used
  useEffect(()=>{
    const cur=themeMode==='auto'?getAutoTheme():themeMode;
    if(['night','dawn','day','dusk'].includes(cur)&&!themesUsed.includes(cur))setThemesUsed(u=>[...u,cur]);
  },[themeMode]);

  // Daily reset — runs on mount AND whenever the calendar day changes (midnight crossing
  // while the app stays open, or returning to a sleeping tab on a new day).
  useEffect(()=>{
    const today=currentDateKey;
    if(lastDate!==today){
      const yd=new Date();yd.setDate(yd.getDate()-1);
      if(lastDate!==dateKey(yd)&&lastDate!=='')setStreak(0);
      setTodayCoins(0);
      // NOTE: do NOT advance lastDate here — that's the job of completeTask/toggleHabit
      // when the user actually does something today. Otherwise the streak never increments.
      // reset completed recurring tasks (keep them, just clear completion)
      setTasks(ts=>ts.map(t=>t.recurring&&t.completed?{...t,completed:false}:t));
    }
    // archive yesterday's prayer if it was saved
    if(prayerDate&&prayerDate!==today&&prayerSaved&&prayerText&&prayerText.trim()){
      setPrayers(p=>[{date:prayerDate,text:prayerText.trim()},...(p||[])].slice(0,200));
      setPrayerText('');setPrayerSaved(false);setPrayerDate(today);
    }
    // Sunday review — show once per Sunday if user has data
    const isSunday=new Date().getDay()===0;
    const hasData=(tasks?.length>0)||(habits?.length>0)||(completedCount>0);
    if(isSunday&&hasData&&lastSundayReview!==today){
      const tm=setTimeout(()=>setShowSundayReview(true),900);
      return()=>clearTimeout(tm);
    }
  },[currentDateKey]);

  // tauri menu integration (no-op in browser)
  useEffect(()=>{
    const ev=window.__TAURI__?.event;
    if(!ev)return;
    let unlisteners=[];
    (async()=>{
      try{
        const wires=[
          ['menu:new-task',()=>{setTab('tasks');setTimeout(()=>window.dispatchEvent(new CustomEvent('lumen:new-task')),50);}],
          ['menu:goto',e=>setTab(e.payload)],
          ['menu:export',()=>{const b=new Blob([exportRef.current()],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='lumen-backup.json';a.click();URL.revokeObjectURL(u);}],
          ['menu:about',()=>setShowSettings(true)],
        ];
        for(const [name,fn] of wires){const u=await ev.listen(name,fn);unlisteners.push(u);}
      }catch(_){}
    })();
    return()=>unlisteners.forEach(u=>{try{u()}catch(_){}});
  },[]);

  // hotkeys
  useEffect(()=>{
    function handler(e){
      if(['INPUT','TEXTAREA'].includes(e.target.tagName))return;
      if((e.ctrlKey||e.metaKey)&&(e.key==='n'||e.key==='N')){e.preventDefault();setTab('tasks');setTimeout(()=>window.dispatchEvent(new CustomEvent('lumen:new-task')),50);return;}
      if(/^[1-5]$/.test(e.key)&&!e.ctrlKey&&!e.metaKey&&!e.altKey){setTab(TAB_ORDER[parseInt(e.key)-1]);return;}
      if(e.key==='Escape'&&showSettings){setShowSettings(false);return;}
      if(e.key==='Escape'&&showSundayReview){setShowSundayReview(false);return;}
    }
    window.addEventListener('keydown',handler);
    return()=>window.removeEventListener('keydown',handler);
  },[showSettings,showSundayReview,tab]);

  // timer
  useEffect(()=>{
    if(!runningTimer)return;
    const iv=setInterval(()=>{
      const extra=Math.floor((Date.now()-runningTimer.startedAt)/1000);
      const total=(runningTimer.baseElapsed||0)+extra;
      setTaskElapsed(te=>({...te,[runningTimer.taskId]:total}));
      // pomodoro at 25 min
      if(total>=1500&&!pomoFiredRef.current){
        pomoFiredRef.current=true;setShowPomo(true);setPomoCount(c=>c+1);
        // browser notification (also works inside Tauri webview)
        try{
          if('Notification' in window){
            if(Notification.permission==='granted')new Notification('LUMEN · 25 минут',{body:t.pomoVerse,silent:false});
            else if(Notification.permission!=='denied')Notification.requestPermission();
          }
        }catch(_){}
      }
    },1000);
    return()=>clearInterval(iv);
  },[runningTimer]);

  function addTask(task){setTasks(ts=>[task,...ts]);}
  function editTask(task){setTasks(ts=>ts.map(t=>t.id===task.id?task:t));}
  function completeTask(id){
    const task=tasks.find(t=>t.id===id);if(!task||task.completed)return;
    const reward={easy:5,medium:10,hard:20}[task.difficulty];
    setTasks(ts=>ts.map(t=>t.id===id?{...t,completed:true}:t));
    setCoins(c=>c+reward);setTodayCoins(c=>c+reward);setCompletedCount(c=>c+1);
    const today=todayKey();
    setTasksByDay(d=>({...d,[today]:(d[today]||0)+1}));
    // Claim any focus time from a running/paused timer on this task — otherwise
    // the user would lose the focus minutes and the bonus coins.
    const elapsedSecs=taskElapsed[id]||0;
    if(elapsedSecs>0){
      const mins=Math.floor(elapsedSecs/60);
      if(mins>0){setCoins(c=>c+mins);setTodayCoins(c=>c+mins);setTotalFocusMin(m=>m+mins);}
      setTaskElapsed(te=>{const n={...te};delete n[id];return n;});
    }
    if(runningTimer?.taskId===id){setRunningTimer(null);pomoFiredRef.current=false;}
    if(lastDate!==today){setStreak(s=>s+1);setLastDate(today);}
  }
  function deleteTask(id){
    setTasks(ts=>ts.filter(t=>t.id!==id));
    if(runningTimer?.taskId===id){setRunningTimer(null);pomoFiredRef.current=false;}
    setTaskElapsed(te=>{const n={...te};delete n[id];return n;}); // free orphan elapsed entry
  }
  function togglePriority(id){setTasks(ts=>ts.map(t=>t.id===id?{...t,priority:!t.priority}:t));}

  function startTimer(taskId){if(runningTimer)pauseTimer(runningTimer.taskId);pomoFiredRef.current=false;setRunningTimer({taskId,startedAt:Date.now(),baseElapsed:taskElapsed[taskId]||0});}
  function pauseTimer(taskId){if(!runningTimer||runningTimer.taskId!==taskId)return;setRunningTimer(null);}
  function stopTimer(taskId){
    const secs=taskElapsed[taskId]||0,mins=Math.floor(secs/60),c=mins;
    setRunningTimer(null);setTaskElapsed(te=>{const n={...te};delete n[taskId];return n;});
    if(c>0){setCoins(co=>co+c);setTodayCoins(co=>co+c);}
    if(mins>0)setTotalFocusMin(m=>m+mins);
    pomoFiredRef.current=false;return c;
  }

  function toggleHabit(id){
    const today=todayKey();
    setHabits(hs=>hs.map(h=>{
      if(h.id!==id)return h;
      const done=h.doneHistory||[];
      if(done.includes(today))return{...h,doneHistory:done.filter(d=>d!==today)};
      const ns=calcHabitStreak(done)+1;
      const bonus=ns%7===0?10:ns%3===0?5:1;
      setCoins(c=>c+bonus);setTodayCoins(c=>c+bonus);
      return{...h,doneHistory:[...done,today]};
    }));
    const today2=todayKey();if(lastDate!==today2){setStreak(s=>s+1);setLastDate(today2);}
  }
  function editHabit(h){setHabits(hs=>hs.some(x=>x.id===h.id)?hs.map(x=>x.id===h.id?h:x):[...hs,h]);}

  function spendCoins(n,reward){
    setCoins(c=>Math.max(0,c-n));
    if(reward&&reward.cat==='alms')setAlmsCount(a=>a+1);
    if(reward&&reward.id===16)setSabbathCount(s=>s+1);
  }
  function getExportData(){return JSON.stringify({_v:1,_exportedAt:new Date().toISOString(),name,tasks,habits,coins,todayCoins,streak,lastDate,lang,themeMode,completedCount,totalFocusMin,prayers,almsCount,pomoCount,lectioCount,sabbathCount,themesUsed,tasksByDay,weeklyReflections,lastSundayReview},null,2);}
  // Keep a live ref so long-lived listeners (Tauri menu) call the current closure,
  // not the stale one captured when the effect first ran.
  const exportRef=useRef(getExportData);exportRef.current=getExportData;
  function handleImport(data){
    if(data.tasks)setTasks(data.tasks);if(data.habits)setHabits(data.habits);
    if(data.coins!=null)setCoins(data.coins);if(data.streak!=null)setStreak(data.streak);
    if(data.todayCoins!=null)setTodayCoins(data.todayCoins);
    if(data.lastDate)setLastDate(data.lastDate);
    if(data.name)setName(data.name);if(data.lang)setLang(data.lang);
    if(data.themeMode)setThemeMode(data.themeMode);
    if(data.completedCount!=null)setCompletedCount(data.completedCount);
    if(data.totalFocusMin!=null)setTotalFocusMin(data.totalFocusMin);
    if(data.prayers)setPrayers(data.prayers);
    if(data.almsCount!=null)setAlmsCount(data.almsCount);
    if(data.pomoCount!=null)setPomoCount(data.pomoCount);
    if(data.lectioCount!=null)setLectioCount(data.lectioCount);
    if(data.sabbathCount!=null)setSabbathCount(data.sabbathCount);
    if(data.themesUsed)setThemesUsed(data.themesUsed);
    if(data.tasksByDay)setTasksByDay(data.tasksByDay);
    if(data.weeklyReflections)setWeeklyReflections(data.weeklyReflections);
    if(data.lastSundayReview)setLastSundayReview(data.lastSundayReview);
    setShowSettings(false);
  }
  function handleReset(){setTasks([]);setHabits([]);setCoins(0);setTodayCoins(0);setStreak(0);setLastDate('');setName('');setPrayers([]);setPrayerText('');setPrayerSaved(false);setAlmsCount(0);setPomoCount(0);setLectioCount(0);setSabbathCount(0);setThemesUsed([]);setCompletedCount(0);setTotalFocusMin(0);setTasksByDay({});setWeeklyReflections([]);setLastSundayReview('');setShowSettings(false);}

  // Stable daily verse: epoch-day index cycles through ALL verses, one new each calendar day.
  const verse=VERSES[Math.floor(Date.now()/86400000)%VERSES.length];
  const rank=getRank(coins);

  // Onboarding lives inside the centered shell so the Tauri titlebar
  // (when present) stays visible above it.
  if(!name) return (
    <div style={{width:'100%',height:'100%',background:C.bg,display:'flex',flexDirection:'column',transition:'background 0.8s ease'}}>
      <TauriTitleBar C={C}/>
      <div className="app-shell" style={{background:C.bg,color:C.text}}>
        <Onboarding onDone={n=>setName(n)} C={C}/>
      </div>
    </div>
  );

  return(
    <div style={{width:'100%',height:'100%',background:C.bg,display:'flex',flexDirection:'column',transition:'background 0.8s ease'}}>
      <TauriTitleBar C={C}/>
      <div className="app-shell" style={{background:C.bg,color:C.text}}>
      {/* header */}
      <div style={{padding:'18px 18px 6px',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:9}}>
          <svg width={20} height={26} viewBox="0 0 22 28" style={{flexShrink:0,filter:`drop-shadow(0 0 5px ${C.gold}66)`,animation:'flicker 4.5s ease-in-out infinite'}}>
            <ellipse cx="11" cy="7" rx="4.5" ry="5.5" fill={C.gold} opacity="0.12"/>
            <path d="M11 1C9.8 4 7.5 5.5 7.5 8.2a3.5 3.5 0 0 0 7 0C14.5 5.5 12.2 4 11 1z" fill={C.gold} style={{transformOrigin:'11px 10px',animation:'flameDance 2.8s ease-in-out infinite'}}/>
            <path d="M11 4.5C10.4 6.2 9.2 7.2 9.2 8.4a1.8 1.8 0 0 0 3.6 0C12.8 7.2 11.6 6.2 11 4.5z" fill="#fde68a" opacity="0.75" style={{transformOrigin:'11px 10px',animation:'flameDance 2.8s ease-in-out infinite'}}/>
            <line x1="11" y1="11.7" x2="11" y2="13.2" stroke={C.gold} strokeWidth="1.4" strokeLinecap="round"/>
            <path d="M7 13.5C6.2 13.5 5.5 14.2 5.5 15L5.5 18.5C5.5 19.8 6.5 20.5 8 20.5L14 20.5C15.5 20.5 16.5 19.8 16.5 18.5L16.5 15C16.5 14.2 15.8 13.5 15 13.5Z" fill="none" stroke={C.gold} strokeWidth="1.25" strokeLinejoin="round"/>
            <path d="M15.5 14.5L19 13" stroke={C.gold} strokeWidth="1.2" strokeLinecap="round"/>
            <path d="M6.5 15.5C4.5 15.5 3.5 16.5 3.5 17.5C3.5 18.8 4.8 19.5 6 19.5" stroke={C.gold} strokeWidth="1.1" strokeLinecap="round" fill="none"/>
            <line x1="11" y1="20.5" x2="11" y2="23" stroke={C.gold} strokeWidth="1.4" strokeLinecap="round"/>
            <path d="M7 23Q6.5 24.5 7.5 25L14.5 25Q15.5 24.5 15 23Z" fill="none" stroke={C.gold} strokeWidth="1.2" strokeLinejoin="round"/>
          </svg>
          <div>
            <div style={{display:'flex',alignItems:'baseline',gap:8}}>
              <span style={{fontFamily:'Cinzel',fontSize:22,letterSpacing:'0.18em',color:C.text}}>LUMEN</span>
              <span style={{fontFamily:'Cinzel',fontSize:14,color:C.goldDim,letterSpacing:'0.1em'}}>{rank.icon} {lang==='ru'?rank.title:rank.titleEn}</span>
            </div>
            <span style={{fontFamily:'Spectral',fontStyle:'italic',fontSize:13.5,color:C.textMid,letterSpacing:'0.02em'}}>{name?`${name} · `:''}{fmtDateLong(lang)}</span>
          </div>
        </div>
        <div onClick={()=>setShowSettings(true)} className="gear-hover" style={{cursor:'pointer',opacity:0.5,padding:4}}><Ic n="gear" s={25} c={C.textMid}/></div>
      </div>
      <StatBar streak={streak} todayCoins={todayCoins} coins={coins} t={t} C={C} name={name} lang={lang}/>
      {/* active timer banner */}
      {runningTimer&&(()=>{
        const task=tasks.find(tk=>tk.id===runningTimer.taskId);
        const secs=taskElapsed[runningTimer.taskId]||0,isPomo=secs>=1500&&secs<1560;
        return(<div style={{margin:'8px 16px 0',border:`1px solid ${isPomo?C.gold:C.border}`,borderRadius:7,padding:'7px 12px',display:'flex',alignItems:'center',gap:9,background:isPomo?`${C.gold}12`:`${C.gold}05`,flexShrink:0,animation:'fadeIn 0.3s ease'}}>
          <div style={{width:7,height:7,borderRadius:'50%',background:C.gold,animation:'glowPulse 1.4s infinite',boxShadow:`0 0 6px ${C.gold}`,flexShrink:0}}/>
          <span style={{fontFamily:'Cinzel',fontSize:15,color:C.gold,letterSpacing:'0.1em',flexShrink:0}}>{fmtTime(secs)}</span>
          <span style={{fontFamily:'Inter',fontSize:17,color:C.textMid,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{task?.title}</span>
          {isPomo&&<span style={{fontFamily:'Cinzel',fontSize:14,color:C.gold,letterSpacing:'0.08em',flexShrink:0}}>🕯 ПОМОДОРО</span>}
        </div>);
      })()}
      <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
        <TabScreen tabKey={tab} prevTab={prevTab}>
          {tab==='tasks'&&<TasksTab tasks={tasks} verse={verse} onAdd={addTask} onEdit={editTask} onComplete={completeTask} onDelete={deleteTask} onTogglePriority={togglePriority} onMove={()=>{}} runningTimer={runningTimer} taskElapsed={taskElapsed} onTimerStart={startTimer} onTimerPause={pauseTimer} onTimerStop={stopTimer} t={t} C={C} lang={lang} showPomo={showPomo} onClosePomo={()=>setShowPomo(false)} taskSearch={taskSearch} setTaskSearch={setTaskSearch}/>}
          {tab==='habits'&&<HabitsTab habits={habits} onToggle={toggleHabit} onAdd={h=>editHabit(h)} onEdit={editHabit} t={t} lang={lang} C={C}/>}
          {tab==='chronicle'&&<ChronicleTab tasks={tasks} habits={habits} streak={streak} coins={coins} lang={lang} t={t} completedCount={completedCount} maxHabitStreak={maxHabitStreak} totalFocusMin={totalFocusMin} prayers={prayers} almsCount={almsCount} pomoCount={pomoCount} lectioCount={lectioCount} sabbathCount={sabbathCount} themesUsed={themesUsed} tasksByDay={tasksByDay} C={C}/>}
          {tab==='rewards'&&<RewardsTab coins={coins} onSpend={spendCoins} lang={lang} t={t} C={C}/>}
          {tab==='scripture'&&<ScriptureTab t={t} C={C} lang={lang} prayerText={prayerText} prayerSaved={prayerSaved} prayers={prayers} setPrayers={setPrayers} onPrayerChange={setPrayerText} onPrayerSave={()=>{if(!prayerText.trim())return;setPrayerSaved(true);setPrayerDate(todayKey());}} onPrayerClear={()=>{setPrayerText('');setPrayerSaved(false);}} onLectioComplete={()=>setLectioCount(c=>c+1)}/>}
        </TabScreen>
      </div>
      <BottomNav tab={tab} setTab={setTab} t={t} C={C}/>
      {showSettings&&<SettingsOverlay onClose={()=>setShowSettings(false)} lang={lang} setLang={setLang} getExportData={getExportData} onImport={handleImport} onReset={handleReset} themeMode={themeMode} setThemeMode={setThemeMode} t={t} C={C}/>}
      {showSundayReview&&<SundayReview onClose={(markSeen)=>{setShowSundayReview(false);if(markSeen)setLastSundayReview(todayKey());}} onSave={(entry)=>{setWeeklyReflections(r=>[...r,entry].slice(-52));setLastSundayReview(todayKey());}} t={t} C={C} lang={lang} tasksByDay={tasksByDay} habits={habits} prayers={prayers} coins={coins} todayCoins={todayCoins} streak={streak} totalFocusMin={totalFocusMin} weeklyReflections={weeklyReflections}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

// PWA service worker registration (browser only, not Tauri)
if ('serviceWorker' in navigator && !window.__TAURI_INTERNALS__) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
