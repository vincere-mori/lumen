ня веруйте.»",ref:"ИОАНН 14:1"},{text:"«Бодрствуйте, стойте в вере, будьте мужественны, тверды.»",ref:"1 КОР 16:13"},{text:"«Ходите осторожно, не как неразумные, но как мудрые.»",ref:"ЕФ 5:15"},{text:"«Кто во Христе, тот новая тварь; древнее прошло — теперь всё новое.»",ref:"2 КОР 5:17"},{text:"«Бог есть свет, и нет в Нём никакой тьмы.»",ref:"1 ИОАНН 1:5"},{text:"«Тесны врата и узок путь, ведущие в жизнь.»",ref:"МАТФЕЙ 7:14"},{text:"«Стучите, и отворят вам.»",ref:"МАТФЕЙ 7:7"},{text:"«В мире будете иметь скорбь; но мужайтесь: Я победил мир.»",ref:"ИОАНН 16:33"},{text:"«Любящим Бога всё содействует ко благу.»",ref:"РИМ 8:28"},{text:"«Если Бог за нас, кто против нас?»",ref:"РИМ 8:31"},{text:"«Не побеждай зла злом, но побеждай зло добром.»",ref:"РИМ 12:21"},{text:"«Бодрствуйте и молитесь, чтобы не впасть в искушение.»",ref:"МАТФЕЙ 26:41"},{text:"«Господь — крепость моя и щит мой; на Него уповало сердце моё.»",ref:"ПСАЛОМ 27:7"},{text:"«Сей день сотворил Господь: возрадуемся и возвеселимся в оный.»",ref:"ПСАЛОМ 117:24"},{text:"«Ты исследуешь путь мой и место отдохновения моего.»",ref:"ПСАЛОМ 138:3"},{text:"«Изведи из темницы душу мою, чтобы славить имя Твоё.»",ref:"ПСАЛОМ 141:8"},{text:"«Когда я в страхе, на Тебя я уповаю.»",ref:"ПСАЛОМ 55:4"},{text:"«Сердце чистое сотвори во мне, Боже, и дух правый обнови.»",ref:"ПСАЛОМ 50:12"},{text:"«Ожидай Господа; мужайся, и да укрепляется сердце твоё.»",ref:"ПСАЛОМ 26:14"},{text:"«Изобилие мира, доколе луна не исчезнет.»",ref:"ПСАЛОМ 71:7"},{text:"«Блажен муж, который не ходит на совет нечестивых.»",ref:"ПСАЛОМ 1:1"},{text:"«Утром услышь голос мой; утром предстану пред Тобою.»",ref:"ПСАЛОМ 5:4"},{text:"«Лучше малое праведника, чем богатство многих нечестивых.»",ref:"ПСАЛОМ 36:16"},{text:"«Воззови ко Мне — и Я отвечу тебе, покажу тебе великое и недоступное.»",ref:"ИЕРЕМИЯ 33:3"},{text:"«Но надеющиеся на Господа обновятся в силе.»",ref:"ИСАИЯ 40:31"},{text:"«Возлюби Господа Бога твоего всем сердцем твоим.»",ref:"МАТФЕЙ 22:37"},{text:"«Ищите же прежде Царства Божия и правды Его.»",ref:"МАТФЕЙ 6:33"},{text:"«Не заботьтесь о завтрашнем дне; довольно для каждого дня своей заботы.»",ref:"МАТФЕЙ 6:34"},{text:"«Кто хочет быть первым, будь из всех последним и всем слугою.»",ref:"МАРК 9:35"},{text:"«Истинно говорю вам: если не обратитесь и не будете как дети, не войдёте в Царство.»",ref:"МАТФЕЙ 18:3"},{text:"«Иго Моё благо и бремя Моё легко.»",ref:"МАТФЕЙ 11:30"},{text:"«Я свет миру; кто последует за Мною, не будет ходить во тьме.»",ref:"ИОАНН 8:12"},{text:"«Блаженны кроткие, ибо они наследуют землю.»",ref:"МАТФЕЙ 5:5"},{text:"«Блаженны алчущие и жаждущие правды, ибо они насытятся.»",ref:"МАТФЕЙ 5:6"},{text:"«Так да светит свет ваш пред людьми, чтобы они видели ваши добрые дела.»",ref:"МАТФЕЙ 5:16"},{text:"«Вечером, и утром, и в полдень буду умолять и вопиять.»",ref:"ПСАЛОМ 54:18"},{text:"«Душа моя жаждет Бога крепкого, живого.»",ref:"ПСАЛОМ 41:3"},{text:"«Время всякой вещи под небом.»",ref:"ЕККЛ 3:1"},{text:"«Нет ничего нового под солнцем.»",ref:"ЕККЛ 1:9"},{text:"«Бойся Бога и заповеди Его соблюдай — в этом всё для человека.»",ref:"ЕККЛ 12:13"},{text:"«Доброе имя лучше большого богатства.»",ref:"ПРИТЧИ 22:1"},{text:"«Кроткий ответ отвращает гнев, а оскорбительное слово возбуждает ярость.»",ref:"ПРИТЧИ 15:1"},{text:"«Не отказывай в благодеянии нуждающемуся, когда рука твоя в силе.»",ref:"ПРИТЧИ 3:27"},{text:"«Праведник из веры жив будет.»",ref:"ГАЛ 3:11"},{text:"«Не будем унывать, делая добро.»",ref:"ГАЛ 6:9"},{text:"«Носите бремена друг друга, и таким образом исполните закон Христов.»",ref:"ГАЛ 6:2"},{text:"«Любовь покрывает множество грехов.»",ref:"1 ПЕТРА 4:8"},{text:"«Все заботы ваши возложите на Него, ибо Он печётся о вас.»",ref:"1 ПЕТРА 5:7"},{text:"«Бог нам прибежище и сила, скорый помощник в бедах.»",ref:"ПСАЛОМ 45:2"},{text:"«Очи мои всегда к Господу.»",ref:"ПСАЛОМ 24:15"},{text:"«Когда я в беде, призываю Его, и Он услышит меня.»",ref:"ПСАЛОМ 49:15"},{text:"«Один день в дворах Твоих лучше тысячи.»",ref:"ПСАЛОМ 83:11"},{text:"«Господь — свет мой и спасение моё: кого мне бояться?»",ref:"ПСАЛОМ 26:1"},{text:"«Не оставит Господь жезла нечестивых над жребием праведных.»",ref:"ПСАЛОМ 124:3"},{text:"«Изливаю пред Ним моление моё; печаль мою открываю Ему.»",ref:"ПСАЛОМ 141:3"},{text:"«В терпении вашем спасайте души ваши.»",ref:"ЛУКА 21:19"},{text:"«Не в сильных конях Его благоволение.»",ref:"ПСАЛОМ 146:10"},{text:"«Восстанет Бог — и расточатся враги Его.»",ref:"ПСАЛОМ 67:2"},{text:"«Помолимся друг за друга, да исцелимся.»",ref:"ИАК 5:16"},{text:"«Старайтесь иметь мир со всеми и святость.»",ref:"ЕВР 12:14"},{text:"«Без веры угодить Богу невозможно.»",ref:"ЕВР 11:6"},{text:"«Вера же есть осуществление ожидаемого и уверенность в невидимом.»",ref:"ЕВР 11:1"},{text:"«В Нём была жизнь, и жизнь была свет человеков.»",ref:"ИОАНН 1:4"},{text:"«Вы — соль земли.»",ref:"МАТФЕЙ 5:13"},{text:"«Где двое или трое собраны во имя Моё, там и Я посреди них.»",ref:"МАТФЕЙ 18:20"},{text:"«Не давайте святыни псам.»",ref:"МАТФЕЙ 7:6"},{text:"«Дух дышит, где хочет.»",ref:"ИОАНН 3:8"},{text:"«Я есмь путь, и истина, и жизнь.»",ref:"ИОАНН 14:6"},{text:"«Мир оставляю вам, мир Мой даю вам.»",ref:"ИОАНН 14:27"},{text:"«Без Меня не можете делать ничего.»",ref:"ИОАНН 15:5"},{text:"«В смирении почитайте один другого высшим себя.»",ref:"ФЛП 2:3"},{text:"«Помышляйте о горнем, а не о земном.»",ref:"КОЛ 3:2"},{text:"«Будьте трезвы, бодрствуйте.»",ref:"1 ПЕТРА 5:8"},{text:"«Кротким даст благодать.»",ref:"ИАК 4:6"},{text:"«Поднимаю глаза мои к горам — откуда придёт помощь моя.»",ref:"ПСАЛОМ 120:1"},{text:"«Не оставлю тебя и не покину тебя.»",ref:"ИИС НАВ 1:5"},{text:"«Бодрствующее око — друг твой.»",ref:"ПРИТЧИ 27:6"},{text:"«Меч духовный — слово Божие.»",ref:"ЕФ 6:17"},{text:"«Утешайтесь надеждою; в скорби будьте терпеливы.»",ref:"РИМ 12:12"},{text:"«Любовь — совокупность совершенства.»",ref:"КОЛ 3:14"},{text:"«Не воздавайте злом за зло.»",ref:"1 ПЕТРА 3:9"},{text:"«Просите, чтобы радость ваша была совершенна.»",ref:"ИОАНН 16:24"},{text:"«Светильник для тела есть око.»",ref:"МАТФЕЙ 6:22"}],x={ru:[{label:"LECTIO",title:"Чтение",hint:"Прочитай слова медленно, вслух или шёпотом. Не спеши."},{label:"MEDITATIO",title:"Размышление",hint:"Какое слово или образ задевают сердце? Останься с ним."},{label:"ORATIO",title:"Молитва",hint:"Ответь Богу — благодарностью, прошением или тишиной."},{label:"CONTEMPLATIO",title:"Созерцание",hint:"Просто будь. Дай слову прорасти в покое."}],en:[{label:"LECTIO",title:"Reading",hint:"Read the words slowly, aloud or in whisper. Do not hurry."},{label:"MEDITATIO",title:"Meditation",hint:"Which word or image touches your heart? Stay with it."},{label:"ORATIO",title:"Prayer",hint:"Answer God — with thanks, request, or silence."},{label:"CONTEMPLATIO",title:"Contemplation",hint:"Simply be. Let the word take root in peace."}]},E=[{id:1,cat:"rest",name:"Час тишины",nameEn:"Hour of Silence",icon:"◌︎",cost:30,verse:"«Придите ко Мне все труждающиеся.»",ref:"МФ 11:28",desc:"Законный отдых без вины",descEn:"A guilt-free rest"},{id:2,cat:"rest",name:"Долгий сон",nameEn:"Long Sleep",icon:"☾︎",cost:50,verse:"«Он дарует сон возлюбленному Своему.»",ref:"ПС 126:2",desc:"Поспать вволю",descEn:"Sleep as long as you need"},{id:3,cat:"rest",name:"Прогулка",nameEn:"A Walk",icon:"⌁︎",cost:25,verse:"«Он ведёт меня к водам тихим.»",ref:"ПС 22:2",desc:"Свежий воздух и ясность",descEn:"Fresh air and clear mind"},{id:4,cat:"joy",name:"Любимый фильм",nameEn:"Favourite Film",icon:"▣︎",cost:80,verse:"«Радуйтесь всегда в Господе.»",ref:"ФЛП 4:4",desc:"Вечер с хорошим кино",descEn:"A movie evening"},{id:5,cat:"joy",name:"Вкусный ужин",nameEn:"Special Dinner",icon:"◍︎",cost:70,verse:"«Хлеб свой ешь с весельем.»",ref:"ЕКЛ 9:7",desc:"Заказать что-то особенное",descEn:"Order something special"},{id:6,cat:"joy",name:"Игры — 1 час",nameEn:"Games 1 Hour",icon:"⌬︎",cost:60,verse:"«Есть время смеяться.»",ref:"ЕКЛ 3:4",desc:"Заслуженное игровое время",descEn:"Earned gaming time
